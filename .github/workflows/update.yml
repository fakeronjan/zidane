name: Update ZIDANE Ratings

on:
  schedule:
    - cron: '19 7 * * *'  # 7:19 AM UTC daily (after overnight European results)
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ratings engine
        run: python zidane.py

      - name: Generate web data
        run: python generate_data.py

      - name: Commit and push updated data
        run: |
          git config user.name  "ZIDANE Bot"
          git config user.email "zidane-bot@users.noreply.github.com"
          git add all_club_games.csv zidane_ratings.csv docs/data/
          git diff --staged --quiet && echo "No changes to commit." || \
            git commit -m "Update ratings $(date -u '+%Y-%m-%d')" && git push
