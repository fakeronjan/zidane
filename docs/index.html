<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZIDANE ΓÇö European Club Soccer Power Rankings</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f8f8f6;
    color: #1a1a1a;
    font-size: 14px;
    line-height: 1.5;
  }

  header {
    background: #0d3b3b;
    color: #fff;
    padding: 20px 24px 16px;
  }
  header h1 {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: 3px;
    color: #ff6eb4;
  }
  header p.subtitle {
    font-size: 12px;
    color: #aaa;
    margin-top: 2px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  header p.updated {
    font-size: 11px;
    color: #666;
    margin-top: 6px;
  }

  nav {
    background: #092d2d;
    display: flex;
    gap: 0;
    overflow-x: auto;
  }
  nav button {
    background: none;
    border: none;
    color: #aaa;
    padding: 12px 20px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.5px;
    white-space: nowrap;
    border-bottom: 3px solid transparent;
    transition: color 0.15s, border-color 0.15s;
  }
  nav button:hover { color: #fff; }
  nav button.active { color: #ff6eb4; border-bottom-color: #ff6eb4; }

  .tab { display: none; padding: 16px; max-width: 1100px; margin: 0 auto; }
  .tab.active { display: block; }

  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 14px;
    align-items: center;
  }
  select {
    padding: 7px 10px;
    border: 1px solid #ddd;
    border-radius: 4px;
    font-size: 13px;
    background: #fff;
    cursor: pointer;
    min-width: 160px;
  }
  .count-label {
    font-size: 12px;
    color: #888;
    margin-left: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    background: #fff;
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  thead th {
    background: #0d3b3b;
    color: #ff6eb4;
    padding: 10px 12px;
    text-align: left;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    white-space: nowrap;
  }
  tbody tr { border-bottom: 1px solid #f0f0f0; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #fafafa; }
  tbody td {
    padding: 9px 12px;
    font-size: 13px;
    vertical-align: middle;
  }

  .rank-cell {
    font-weight: 700;
    color: #888;
    width: 36px;
    text-align: right;
  }
  .team-cell { font-weight: 600; }
  .league-badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 3px;
    letter-spacing: 0.3px;
    white-space: nowrap;
  }
  .badge-EPL        { background: #3d0f70; color: #fff; }
  .badge-LaLiga     { background: #c8102e; color: #fff; }
  .badge-Bundesliga { background: #d20515; color: #fff; }
  .badge-SerieA     { background: #003899; color: #fff; }
  .badge-Ligue1     { background: #003f8a; color: #fff; }
  .badge-Other      { background: #555; color: #fff; }

  .rating-cell {
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: #0d3b3b;
  }
  .rating-bar-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .rating-bar-track {
    width: 80px;
    height: 6px;
    background: #eee;
    border-radius: 3px;
    position: relative;
    flex-shrink: 0;
  }
  .rating-bar-center-line {
    position: absolute;
    left: 50%;
    top: 0;
    width: 1px;
    height: 6px;
    background: #ccc;
  }
  .rating-bar-fill {
    position: absolute;
    height: 6px;
    background: #ff6eb4;
    border-radius: 3px;
    top: 0;
  }

  .finish-badge {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 5px;
    border-radius: 3px;
    white-space: nowrap;
  }
  .finish-champion { background: #ff6eb4; color: #0d3b3b; }
  .finish-runner   { background: #ddd; color: #444; }
  .finish-leader   { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }

  .last-match-cell {
    font-size: 12px;
    color: #555;
    max-width: 240px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .result-W { color: #2e7d32; font-weight: 700; }
  .result-L { color: #c62828; font-weight: 700; }
  .result-D { color: #f57f17; font-weight: 700; }

  /* Season chart */
  #chart-wrap {
    background: #fff;
    border-radius: 6px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    padding: 16px;
    margin-bottom: 14px;
  }
  #season-chart {
    width: 100%;
    height: 160px;
    display: block;
  }

  .loading { color: #888; padding: 20px; text-align: center; font-size: 13px; }
  .error   { color: #c62828; padding: 20px; font-size: 13px; }
  .data-note { font-size: 11px; color: #888; margin-bottom: 10px; }

  /* League History table */
  .col-champ  { background: #fffdf3; }
  .col-ru     { background: #fafafa; }
  .season-cell { font-weight: 700; color: #0d3b3b; white-space: nowrap; }
  .divider-col { width: 4px; background: #e8e8e8; padding: 0; }
  #history-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }

  /* Table containers scroll horizontally rather than breaking layout */
  #standings-table-wrap,
  #team-table-wrap,
  #goat-table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }

  @media (max-width: 600px) {
    header { padding: 14px 16px 12px; }
    header h1 { font-size: 20px; letter-spacing: 2px; }
    nav button { padding: 10px 14px; font-size: 12px; }
    .tab { padding: 12px; }
    td, th { padding: 7px 8px; font-size: 12px; }
    .last-match-cell { max-width: 130px; }
    .controls { flex-direction: column; align-items: stretch; }
    select { min-width: unset; width: 100%; }
    .rating-bar-track { display: none; }    /* drop bar on small screens, keep number */
    /* hide lower-priority columns on mobile */
    .col-hide-mobile { display: none; }
  }
</style>
</head>
<body>

<header>
  <h1>ZIDANE</h1>
  <p class="subtitle">European Club Soccer Power Rankings</p>
  <p class="updated" id="last-updated">Loading...</p>
</header>

<nav>
  <button class="active" data-tab="standings">Standings</button>
  <button data-tab="team-summary">Team Summary</button>
  <button data-tab="league-history">League History</button>
  <button data-tab="goat">GOAT Table</button>
</nav>

<!-- ΓöÇΓöÇ STANDINGS ΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇ -->
<div id="standings" class="tab active">
  <div class="controls">
    <select id="season-filter"></select>
    <select id="date-filter" style="min-width:200px"></select>
    <select id="league-filter">
      <option value="all">All Leagues</option>
      <option value="EPL">EPL</option>
      <option value="La Liga">La Liga</option>
      <option value="Bundesliga">Bundesliga</option>
      <option value="Serie A">Serie A</option>
      <option value="Ligue 1">Ligue 1</option>
    </select>
    <span class="count-label" id="standings-count"></span>
  </div>
  <div id="standings-table-wrap"><p class="loading">Loading standings...</p></div>
</div>

<!-- ΓöÇΓöÇ TEAM SUMMARY ΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇ -->
<div id="team-summary" class="tab">
  <div class="controls">
    <select id="league-select">
      <option value="">ΓÇö Select a league ΓÇö</option>
      <option value="EPL">≡ƒÅ┤≤áüº≤áüó≤áüÑ≤áü«≤áüº≤áü┐ EPL</option>
      <option value="La Liga">≡ƒç¬≡ƒç╕ La Liga</option>
      <option value="Bundesliga">≡ƒç⌐≡ƒç¬ Bundesliga</option>
      <option value="Serie A">≡ƒç«≡ƒç╣ Serie A</option>
      <option value="Ligue 1">≡ƒç½≡ƒç╖ Ligue 1</option>
    </select>
    <select id="team-select" disabled><option value="">ΓÇö Select a team ΓÇö</option></select>
    <select id="season-select"><option value="all">All Seasons</option></select>
  </div>
  <div id="chart-wrap" style="display:none">
    <svg id="season-chart"></svg>
  </div>
  <div id="team-table-wrap"><p class="loading">Select a team above.</p></div>
</div>

<!-- ΓöÇΓöÇ LEAGUE HISTORY ΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇ -->
<div id="league-history" class="tab">
  <div class="controls">
    <select id="history-league-filter">
      <option value="">ΓÇö Select a league ΓÇö</option>
      <option value="EPL">≡ƒÅ┤≤áüº≤áüó≤áüÑ≤áü«≤áüº≤áü┐ EPL</option>
      <option value="La Liga">≡ƒç¬≡ƒç╕ La Liga</option>
      <option value="Bundesliga">≡ƒç⌐≡ƒç¬ Bundesliga</option>
      <option value="Serie A">≡ƒç«≡ƒç╣ Serie A</option>
      <option value="Ligue 1">≡ƒç½≡ƒç╖ Ligue 1</option>
    </select>
  </div>
  <div id="history-table-wrap"><p class="loading">Select a league above.</p></div>
</div>

<!-- ΓöÇΓöÇ GOAT TABLE ΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇ -->
<div id="goat" class="tab">
  <div class="controls">
    <select id="goat-league-filter">
      <option value="all">All Leagues</option>
      <option value="EPL">EPL</option>
      <option value="La Liga">La Liga</option>
      <option value="Bundesliga">Bundesliga</option>
      <option value="Serie A">Serie A</option>
      <option value="Ligue 1">Ligue 1</option>
    </select>
  </div>
  <p class="data-note">Top 50 single-season ratings ┬╖ Data covers 2011ΓÇô12 through the current season</p>
  <div id="goat-table-wrap"><p class="loading">Loading GOAT table...</p></div>
</div>

<script>
const BASE = './data';
let currentSeasonData = null;
let currentSnapshot   = null;
let goatData          = null;
let teamsIndex        = null;
let teamCache         = {};

// ΓöÇΓöÇ Utilities ΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇ
function leagueBadge(league) {
  const cls = {
    'EPL': 'badge-EPL', 'La Liga': 'badge-LaLiga',
    'Bundesliga': 'badge-Bundesliga', 'Serie A': 'badge-SerieA',
    'Ligue 1': 'badge-Ligue1'
  }[league] || 'badge-Other';
  const short = {
    'EPL':        '≡ƒÅ┤≤áüº≤áüó≤áüÑ≤áü«≤áüº≤áü┐ EPL',
    'La Liga':    '≡ƒç¬≡ƒç╕ La Liga',
    'Bundesliga': '≡ƒç⌐≡ƒç¬ BL',
    'Serie A':    '≡ƒç«≡ƒç╣ Serie A',
    'Ligue 1':    '≡ƒç½≡ƒç╖ Ligue 1',
  }[league] || league;
  return `<span class="league-badge ${cls}">${short}</span>`;
}

function finishBadge(dom, cl, el) {
  const bits = [];
  if (cl === 'Champion')   bits.push(`<span class="finish-badge finish-champion">CL Γÿà</span>`);
  if (cl === 'Runner-Up')  bits.push(`<span class="finish-badge finish-runner">CL 2nd</span>`);
  if (el === 'Champion')   bits.push(`<span class="finish-badge finish-champion">EL Γÿà</span>`);
  if (dom === 'Champion')  bits.push(`<span class="finish-badge finish-champion">League Γÿà</span>`);
  if (dom === 'Runner-Up') bits.push(`<span class="finish-badge finish-runner">League 2nd</span>`);
  if (dom === '1st')       bits.push(`<span class="finish-badge finish-leader">League 1st</span>`);
  if (dom === '2nd')       bits.push(`<span class="finish-badge finish-leader">League 2nd</span>`);
  return bits.join(' ');
}

function resultClass(match) {
  if (!match) return '';
  const first = match[0];
  if (first === 'W') return 'result-W';
  if (first === 'L') return 'result-L';
  if (first === 'D') return 'result-D';
  return '';
}

const BAR_MIN = -2.0, BAR_MAX = 2.0, BAR_RANGE = 4.0;

function ratingBar(rating) {
  const clipped = Math.max(BAR_MIN, Math.min(BAR_MAX, rating));
  // 0.0 sits at 50% of the track; each unit = 12.5% of track width
  let leftPct, widthPct;
  if (clipped >= 0) {
    leftPct  = 50;
    widthPct = (clipped / BAR_RANGE) * 100;
  } else {
    widthPct = (-clipped / BAR_RANGE) * 100;
    leftPct  = 50 - widthPct;
  }
  return `<div class="rating-bar-wrap">
    <span class="rating-cell">${rating.toFixed(3)}</span>
    <div class="rating-bar-track">
      <div class="rating-bar-center-line"></div>
      <div class="rating-bar-fill" style="left:${leftPct.toFixed(1)}%;width:${widthPct.toFixed(1)}%"></div>
    </div>
  </div>`;
}

// ΓöÇΓöÇ Tab switching ΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇ
document.querySelectorAll('nav button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.tab).classList.add('active');
  });
});

// ΓöÇΓöÇ Standings ΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇ
async function initStandings() {
  try {
    const res = await fetch(`${BASE}/seasons_index.json`);
    const seasons = await res.json();
    const sel = document.getElementById('season-filter');
    seasons.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s; opt.textContent = s;
      sel.appendChild(opt);
    });
    await loadSeason(seasons[0]);
  } catch(e) {
    document.getElementById('standings-table-wrap').innerHTML =
      `<p class="error">Could not load standings.</p>`;
  }
}

async function loadSeason(season) {
  try {
    const res = await fetch(`${BASE}/seasons/${season}.json`);
    currentSeasonData = await res.json();
    const snaps = currentSeasonData.snapshots;
    const dateSel = document.getElementById('date-filter');
    dateSel.innerHTML = '';
    [...snaps].reverse().forEach(snap => {
      const opt = document.createElement('option');
      opt.value = snap.date;
      opt.textContent = snap.label ? `${snap.date} ΓÇö ${snap.label}` : snap.date;
      dateSel.appendChild(opt);
    });
    selectSnapshot(snaps[snaps.length - 1].date);
  } catch(e) {
    document.getElementById('standings-table-wrap').innerHTML =
      `<p class="error">Could not load season data.</p>`;
  }
}

function selectSnapshot(date) {
  currentSnapshot = currentSeasonData.snapshots.find(s => s.date === date);
  document.getElementById('last-updated').textContent = `Standings as of: ${currentSnapshot.date}`;
  document.getElementById('date-filter').value = date;
  renderStandings();
}

function renderStandings() {
  if (!currentSnapshot) return;
  const league = document.getElementById('league-filter').value;
  let teams = currentSnapshot.teams;
  if (league !== 'all') teams = teams.filter(t => t.league === league);

  let displayRank = 1;
  const rows = teams.map(t => {
    const rank = league === 'all' ? t.rank : displayRank++;
    return `<tr>
      <td class="rank-cell">${rank}</td>
      <td class="team-cell">${t.team}</td>
      <td>${leagueBadge(t.league)}</td>
      <td style="font-variant-numeric:tabular-nums;white-space:nowrap">${t.record || 'ΓÇö'}</td>
      <td>${ratingBar(t.rating)}</td>
      <td class="last-match-cell">
        <span class="${resultClass(t.last_match)}">${t.last_match || 'ΓÇö'}</span>
      </td>
      <td class="col-hide-mobile" style="font-size:11px;color:#888;white-space:nowrap">${t.last_match_date || ''}</td>
      <td class="col-hide-mobile" style="font-size:11px">${finishBadge(t.domestic_finish, t.cl_finish, t.el_finish)}</td>
    </tr>`;
  }).join('');

  document.getElementById('standings-count').textContent =
    `${teams.length} team${teams.length !== 1 ? 's' : ''}`;

  document.getElementById('standings-table-wrap').innerHTML = `
    <table>
      <thead><tr>
        <th>#</th><th>Team</th><th>League</th><th>League Rec</th><th>Rating</th>
        <th>Last Match</th>
        <th class="col-hide-mobile">Date</th>
        <th class="col-hide-mobile">Honors</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

document.getElementById('season-filter').addEventListener('change', e => loadSeason(e.target.value));
document.getElementById('date-filter').addEventListener('change', e => selectSnapshot(e.target.value));
document.getElementById('league-filter').addEventListener('change', renderStandings);

// ΓöÇΓöÇ Team Summary ΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇ
async function loadTeamsIndex() {
  try {
    const res = await fetch(`${BASE}/teams_index.json`);
    teamsIndex = await res.json();
  } catch(e) {
    document.getElementById('team-select').innerHTML =
      '<option>Could not load teams</option>';
  }
}

function populateTeams(league) {
  const sel = document.getElementById('team-select');
  sel.innerHTML = '<option value="">ΓÇö Select a team ΓÇö</option>';
  if (!league || !teamsIndex) { sel.disabled = true; return; }
  teamsIndex.filter(t => t.league === league).forEach(t => {
    const opt = document.createElement('option');
    opt.value = t.slug;
    opt.textContent = t.name;
    sel.appendChild(opt);
  });
  sel.disabled = false;
}

document.getElementById('league-select').addEventListener('change', e => {
  populateTeams(e.target.value);
  document.getElementById('chart-wrap').style.display = 'none';
  document.getElementById('team-table-wrap').innerHTML =
    '<p class="loading">Select a team above.</p>';
  document.getElementById('season-select').innerHTML =
    '<option value="all">All Seasons</option>';
});

async function loadTeam(slug) {
  if (!slug) return;
  if (!teamCache[slug]) {
    document.getElementById('team-table-wrap').innerHTML =
      '<p class="loading">Loading team data...</p>';
    try {
      const res = await fetch(`${BASE}/teams/${slug}.json`);
      teamCache[slug] = await res.json();
    } catch(e) {
      document.getElementById('team-table-wrap').innerHTML =
        '<p class="error">Could not load team data.</p>';
      return;
    }
  }
  const data = teamCache[slug];
  const seasons = Object.keys(data.seasons).sort().reverse();
  const seasonSel = document.getElementById('season-select');
  seasonSel.innerHTML = '<option value="all">All Seasons</option>';
  seasons.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s;
    opt.textContent = s;
    seasonSel.appendChild(opt);
  });
  renderTeamTable();
}

function renderTeamTable() {
  const slug = document.getElementById('team-select').value;
  if (!slug || !teamCache[slug]) return;
  const data = teamCache[slug];
  const seasonFilter = document.getElementById('season-select').value;

  let rows = [];
  const seasons = Object.keys(data.seasons).sort();
  seasons.forEach(s => {
    if (seasonFilter !== 'all' && s !== seasonFilter) return;
    data.seasons[s].forEach(g => rows.push({...g, season: s}));
  });

  // Chart
  drawChart(rows);

  // Table (reverse chronological)
  const tableRows = [...rows].reverse().map(g => `<tr>
    <td style="white-space:nowrap;color:#888;font-size:12px">${g.date}</td>
    <td style="font-size:11px;color:#555">${g.season}</td>
    <td class="last-match-cell">
      <span class="${resultClass(g.last_match)}">${g.last_match || 'ΓÇö'}</span>
    </td>
    <td style="font-variant-numeric:tabular-nums;white-space:nowrap">${g.record || 'ΓÇö'}</td>
    <td>${ratingBar(g.rating)}</td>
    <td class="rank-cell">${g.rank}</td>
    <td class="col-hide-mobile" style="font-size:11px">${finishBadge(g.domestic_finish, g.cl_finish, g.el_finish)}</td>
  </tr>`).join('');

  document.getElementById('team-table-wrap').innerHTML = `
    <table>
      <thead><tr>
        <th>Date</th><th>Season</th><th>Last Match</th>
        <th>League Rec</th><th>Rating</th><th>Rank</th>
        <th class="col-hide-mobile">Honors</th>
      </tr></thead>
      <tbody>${tableRows}</tbody>
    </table>`;
}

function drawChart(rows) {
  const wrap = document.getElementById('chart-wrap');
  if (rows.length < 2) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';

  const svg = document.getElementById('season-chart');
  const W = svg.parentElement.clientWidth - 32;
  const H = 160;
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);

  const ratings = rows.map(r => r.rating);
  const minR = Math.min(...ratings) - 0.1;
  const maxR = Math.max(...ratings) + 0.1;

  const px = (i) => (i / (rows.length - 1)) * (W - 20) + 10;
  const py = (r) => H - 20 - ((r - minR) / (maxR - minR)) * (H - 30);

  const points = rows.map((r, i) => `${px(i).toFixed(1)},${py(r.rating).toFixed(1)}`).join(' ');
  const areaBot = `${px(rows.length-1).toFixed(1)},${H-20} ${px(0).toFixed(1)},${H-20}`;

  svg.innerHTML = `
    <defs>
      <linearGradient id="chartGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#ff6eb4" stop-opacity="0.3"/>
        <stop offset="100%" stop-color="#ff6eb4" stop-opacity="0.03"/>
      </linearGradient>
    </defs>
    <line x1="10" y1="${(H-20).toFixed(1)}" x2="${(W-10).toFixed(1)}" y2="${(H-20).toFixed(1)}"
          stroke="#eee" stroke-width="1"/>
    <polygon points="${points} ${areaBot}" fill="url(#chartGrad)"/>
    <polyline points="${points}" fill="none" stroke="#ff6eb4" stroke-width="2" stroke-linejoin="round"/>`;
}

document.getElementById('team-select').addEventListener('change', e => {
  loadTeam(e.target.value);
});
document.getElementById('season-select').addEventListener('change', renderTeamTable);

// ΓöÇΓöÇ League History ΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇ
let championsData = null;

async function loadChampions() {
  try {
    const res = await fetch(`${BASE}/champions.json`);
    championsData = await res.json();
  } catch(e) {
    document.getElementById('history-table-wrap').innerHTML =
      `<p class="error">Could not load league history.</p>`;
  }
}

function renderLeagueHistory(league) {
  if (!championsData || !league) return;
  const entries = championsData[league] || [];
  if (!entries.length) {
    document.getElementById('history-table-wrap').innerHTML =
      `<p class="loading">No data for this league.</p>`;
    return;
  }

  function honorBadges(cl, el) {
    const bits = [];
    if (cl === 'Champion')  bits.push(`<span class="finish-badge finish-champion">CL Γÿà</span>`);
    if (cl === 'Runner-Up') bits.push(`<span class="finish-badge finish-runner">CL 2nd</span>`);
    if (el === 'Champion')  bits.push(`<span class="finish-badge finish-champion">EL Γÿà</span>`);
    return bits.join(' ');
  }

  function teamCell(t, bg) {
    if (!t) return `<td class="${bg}" colspan="3">ΓÇö</td>`;
    const honors = honorBadges(t.cl_finish, t.el_finish);
    return `
      <td class="${bg} team-cell" style="white-space:nowrap">${t.team}${honors ? ' ' + honors : ''}</td>
      <td class="${bg} rating-cell" style="font-variant-numeric:tabular-nums">${t.rating.toFixed(3)}</td>
      <td class="${bg} col-hide-mobile" style="font-variant-numeric:tabular-nums;white-space:nowrap">${t.record}</td>`;
  }

  const rows = entries.map(e => `<tr>
    <td class="season-cell">${e.season}</td>
    ${teamCell(e.champion,  'col-champ')}
    <td class="divider-col"></td>
    ${teamCell(e.runner_up, 'col-ru')}
  </tr>`).join('');

  document.getElementById('history-table-wrap').innerHTML = `
    <table>
      <thead><tr>
        <th>Season</th>
        <th class="col-champ">Champion</th>
        <th class="col-champ">Rating</th>
        <th class="col-champ col-hide-mobile">Record</th>
        <th class="divider-col"></th>
        <th class="col-ru">Runner-Up</th>
        <th class="col-ru">Rating</th>
        <th class="col-ru col-hide-mobile">Record</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

document.getElementById('history-league-filter').addEventListener('change', e => {
  renderLeagueHistory(e.target.value);
});

// ΓöÇΓöÇ GOAT Table ΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇ
async function loadGoat() {
  try {
    const res = await fetch(`${BASE}/goat_teams.json`);
    goatData = await res.json();
    renderGoat();
  } catch(e) {
    document.getElementById('goat-table-wrap').innerHTML =
      `<p class="error">Could not load GOAT table.</p>`;
  }
}

function renderGoat() {
  const league = document.getElementById('goat-league-filter').value;
  let teams = goatData;
  if (league !== 'all') teams = teams.filter(t => t.league === league);

  let displayRank = 1;
  const rows = teams.map(t => `<tr>
    <td class="rank-cell">${displayRank++}</td>
    <td class="team-cell">${t.team}</td>
    <td>${t.season}</td>
    <td>${leagueBadge(t.league)}</td>
    <td>${ratingBar(t.rating)}</td>
    <td class="col-hide-mobile" style="font-size:11px">${finishBadge(t.domestic_finish, t.cl_finish, t.el_finish)}</td>
  </tr>`).join('');

  document.getElementById('goat-table-wrap').innerHTML = `
    <table>
      <thead><tr>
        <th>#</th><th>Team</th><th>Season</th><th>League</th>
        <th>Rating</th>
        <th class="col-hide-mobile">Honors</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

document.getElementById('goat-league-filter').addEventListener('change', renderGoat);

// ΓöÇΓöÇ Init ΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇ
initStandings();
loadTeamsIndex();
loadChampions();
loadGoat();
</script>
